name: flutter_frontend
description: "FilmMosaic - Movie discovery and social platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.0
  dio: ^5.7.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2
  lottie: ^3.3.0
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.1.1
  shimmer: ^3.0.0
  infinite_scroll_pagination: ^4.1.0
  intl: ^0.20.2
  logger: ^2.5.0
  firebase_core: ^3.12.0
  firebase_crashlytics: ^4.3.0
  firebase_analytics: ^11.4.0
  firebase_messaging: ^15.2.0
  image_picker: ^1.1.2
  shared_preferences: ^2.5.5
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
    - assets/fonts/
